spring:
  application:
    name: aico
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${AICO_DB_URL:jdbc:mysql://localhost:3306/aico?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8}
    username: ${AICO_DB_USERNAME:aico}
    password: ${AICO_DB_PASSWORD:change-me}
  rabbitmq:
    host: ${AICO_RABBITMQ_HOST:localhost}
    port: ${AICO_RABBITMQ_PORT:5672}
    username: ${AICO_RABBITMQ_USERNAME:guest}
    password: ${AICO_RABBITMQ_PASSWORD:guest}
    virtual-host: ${AICO_RABBITMQ_VHOST:/}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.project.smart_intervention.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: ${AICO_SERVER_PORT:8081}
